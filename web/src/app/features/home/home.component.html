<section class="dash" aria-labelledby="dash-title">
  <header class="dash__hero">
    <h1 id="dash-title" class="dash__title">BibliotecaControl</h1>
    <p class="dash__subtitle">
      Elija un área para ver las operaciones disponibles frente a la API
      <code>{{ env.apiVersionPath }}</code>.
      Base de servicios: <strong>{{ apiRoot || '(origen actual)' }}</strong>.
    </p>
  </header>

  <div class="dash__grid" role="list">
    @for (area of areas(); track area.slug) {
      <article class="area-card" role="listitem">
        <a [routerLink]="area.route" class="area-card__surface">
          <span class="area-card__badge" aria-hidden="true">{{ area.badge }}</span>
          <div class="area-card__body">
            <h2 class="area-card__title">{{ area.title }}</h2>
            <p class="area-card__summary">{{ area.summary }}</p>
            <span class="area-card__cta">Abrir módulo →</span>
          </div>
        </a>
      </article>
    }
  </div>
</section>
