<section class="pf" aria-labelledby="pf-title">
  <app-back-link [link]="backLink()" [label]="backLabel()" />
  <nav class="pf__crumb" aria-label="Migas de pan">
    <a routerLink="/personas" class="pf__crumb-link">Personas</a>
    <span class="pf__crumb-sep" aria-hidden="true">/</span>
    <span class="pf__crumb-current">{{ isEdit() ? 'Editar' : 'Nueva' }}</span>
  </nav>

  <h1 id="pf-title" class="pf__title">{{ isEdit() ? 'Editar persona' : 'Nueva persona' }}</h1>

  @if (isEdit() && loading()) {
    <app-loading-block label="Cargando datos…" />
  } @else if (isEdit() && editLoadFailed()) {
    <p class="pf__intro">No se pudieron cargar los datos.</p>
    <a routerLink="/personas" class="pf__btn pf__btn--ghost">Volver al listado</a>
  } @else if (!isEdit() || !editLoadFailed()) {
    <form class="pf__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="pf__grid">
        <div class="pf__field">
          <label for="pf-first">Nombre <span class="pf__req" aria-hidden="true">*</span></label>
          <input id="pf-first" type="text" formControlName="firstName" autocomplete="given-name" maxlength="100" required />
          <app-control-validation-message [control]="form.controls.firstName" [overrides]="personFieldMessages['firstName']" />
        </div>
        <div class="pf__field">
          <label for="pf-last">Apellidos <span class="pf__req" aria-hidden="true">*</span></label>
          <input id="pf-last" type="text" formControlName="lastName" autocomplete="family-name" maxlength="100" required />
          <app-control-validation-message [control]="form.controls.lastName" [overrides]="personFieldMessages['lastName']" />
        </div>
        <div class="pf__field">
          <label for="pf-doc">Documento <span class="pf__optional">(opcional)</span></label>
          <input id="pf-doc" type="text" formControlName="nationalId" autocomplete="off" maxlength="40" />
          <app-control-validation-message [control]="form.controls.nationalId" [overrides]="personFieldMessages['nationalId']" />
        </div>
        <div class="pf__field">
          <label for="pf-email">Correo <span class="pf__optional">(opcional)</span></label>
          <input id="pf-email" type="email" formControlName="email" autocomplete="email" maxlength="120" />
          <app-control-validation-message [control]="form.controls.email" [overrides]="personFieldMessages['email']" />
        </div>
        <div class="pf__field">
          <label for="pf-phone">Teléfono <span class="pf__optional">(opcional)</span></label>
          <input id="pf-phone" type="tel" formControlName="phone" autocomplete="tel" maxlength="40" />
          <app-control-validation-message [control]="form.controls.phone" [overrides]="personFieldMessages['phone']" />
        </div>
        <div class="pf__field pf__field--full">
          <label for="pf-address">Dirección <span class="pf__optional">(opcional)</span></label>
          <textarea id="pf-address" formControlName="address" rows="3" maxlength="500"></textarea>
          <app-control-validation-message [control]="form.controls.address" [overrides]="personFieldMessages['address']" />
        </div>
      </div>

      <div class="pf__actions">
        <a routerLink="/personas" class="pf__btn pf__btn--ghost">Cancelar</a>
        <button type="submit" class="pf__btn pf__btn--primary" [disabled]="saving()">
          {{ saving() ? 'Guardando…' : 'Guardar' }}
        </button>
      </div>
    </form>
  }
</section>
