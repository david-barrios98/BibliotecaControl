<section class="uf" aria-labelledby="uf-title">
  <app-back-link [link]="['/usuarios']" label="Usuarios" />

  <h1 id="uf-title" class="uf__title">@if (isEdit()) { Editar usuario } @else { Nuevo usuario }</h1>
  <p class="uf__intro">Solo administradores. En edición, la contraseña es opcional y funciona como “reset”.</p>

  @if (loading()) {
    <app-loading-block label="Cargando usuario…" />
  } @else {
    @if (loadFailed()) {
      <p class="uf__intro">No se pudo cargar el usuario.</p>
      <a routerLink="/usuarios" class="uf__btn uf__btn--primary">Volver</a>
    } @else {
      <form class="uf__form" [formGroup]="form" (ngSubmit)="submit()">
        <div class="uf__grid">
          <label class="uf__field">
            <span>Username <span class="uf__req">*</span></span>
            <input type="text" formControlName="username" autocomplete="off" />
          </label>
          <label class="uf__field">
            <span>Rol <span class="uf__req">*</span></span>
            <select formControlName="role">
              <option value="Admin">Admin</option>
              <option value="User">User</option>
            </select>
          </label>
          <label class="uf__field uf__field--full">
            <span>Email</span>
            <input type="email" formControlName="email" autocomplete="off" placeholder="opcional" />
          </label>
          <label class="uf__field uf__field--full">
            <span>Contraseña @if (!isEdit()) { <span class="uf__req">*</span> }</span>
            <input
              type="password"
              formControlName="password"
              autocomplete="new-password"
              [placeholder]="isEdit() ? 'Dejar en blanco para no cambiar' : 'Obligatoria al crear'"
            />
          </label>
        </div>

        <div class="uf__actions">
          <a routerLink="/usuarios" class="uf__btn uf__btn--ghost">Cancelar</a>
          <button type="submit" class="uf__btn uf__btn--primary" [disabled]="saving()">
            {{ saving() ? 'Guardando…' : 'Guardar' }}
          </button>
        </div>
      </form>
    }
  }
</section>
