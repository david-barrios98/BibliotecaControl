<div class="shell">
  <header class="shell__header">
    <a routerLink="/" class="shell__brand">BibliotecaControl</a>
    <nav class="shell__nav" aria-label="Navegación principal">
      <a
        routerLink="/"
        routerLinkActive="shell__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="shell__link"
      >
        Inicio
      </a>
      <a routerLink="/autores" routerLinkActive="shell__link--active" class="shell__link">Autores</a>
      <a routerLink="/libros" routerLinkActive="shell__link--active" class="shell__link">Libros</a>
      <a routerLink="/personas" routerLinkActive="shell__link--active" class="shell__link">Personas</a>
      <a routerLink="/prestamos" routerLinkActive="shell__link--active" class="shell__link">Préstamos</a>
      <a routerLink="/reportes" routerLinkActive="shell__link--active" class="shell__link">Reportes</a>
      @if (isAdmin()) {
        <a routerLink="/usuarios" routerLinkActive="shell__link--active" class="shell__link">Usuarios</a>
      }
      @if (isLoggedIn()) {
        <button type="button" class="shell__link shell__link--btn" (click)="logout()">Cerrar sesión</button>
      } @else {
        <a routerLink="/login" routerLinkActive="shell__link--active" class="shell__link">Login</a>
      }
    </nav>
  </header>
  <main class="shell__main" id="main-content">
    <router-outlet />
  </main>
</div>
